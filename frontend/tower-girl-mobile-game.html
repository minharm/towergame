<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>스카이 타워 점프</title>
<style>
  :root {
    --ui-bg: rgba(255, 255, 255, 0.72);
    --ui-border: rgba(255, 255, 255, 0.92);
    --pink: #ff78bd;
    --purple: #7f5af0;
    --text-dark: #342c55;
    --app-height: 100dvh;
  }

  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at 30% 20%, #ffdff0 0%, #d6deff 35%, #9cb5ff 100%);
    color: var(--text-dark);
    touch-action: none;
  }

  #gameWrap {
    position: fixed;
    left: 0;
    top: 0;
    width: 100%;
    height: var(--app-height);
    display: grid;
    grid-template-rows: auto minmax(0, 1fr) auto;
    padding:
      calc(env(safe-area-inset-top) + 8px)
      10px
      calc(env(safe-area-inset-bottom) + 10px);
    gap: 8px;
    overflow: hidden;
  }

  #hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    background: var(--ui-bg);
    border: 1px solid var(--ui-border);
    border-radius: 16px;
    padding: 10px 14px;
    backdrop-filter: blur(7px);
    box-shadow: 0 8px 20px rgba(80, 60, 140, 0.16);
    z-index: 3;
  }

  .stat {
    font-size: 14px;
    font-weight: 700;
    white-space: nowrap;
  }

  #gameCanvas {
    width: 100%;
    height: 100%;
    min-height: 0;
    display: block;
    border-radius: 18px;
    border: 1px solid rgba(255, 255, 255, 0.45);
    box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.28), 0 16px 34px rgba(50, 50, 120, 0.2);
    background: linear-gradient(#d4f0ff, #b3c6ff 58%, #8ea5ff);
  }

  #controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    z-index: 4;
  }

  .pad {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  button.ctrl {
    border: 1px solid var(--ui-border);
    background: var(--ui-bg);
    color: var(--text-dark);
    border-radius: 18px;
    min-width: 62px;
    height: 62px;
    font-size: 24px;
    font-weight: 900;
    box-shadow: 0 8px 20px rgba(80, 60, 140, 0.18);
    backdrop-filter: blur(8px);
    cursor: pointer;
    touch-action: manipulation;
  }

  button.ctrl:active,
  button.ctrl.active {
    transform: translateY(2px) scale(0.97);
    background: rgba(255, 255, 255, 0.92);
  }

  #jumpBtn {
    min-width: 88px;
    font-size: 18px;
    background: linear-gradient(120deg, #ffd8f5, #e9d9ff);
    color: #4f2f72;
  }

  #message {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.96);
    border-radius: 18px;
    padding: 18px 20px;
    text-align: center;
    box-shadow: 0 12px 28px rgba(58, 51, 104, 0.25);
    width: min(360px, calc(100vw - 32px));
    max-width: calc(100vw - 32px);
    z-index: 9;
  }

  #message h1 {
    margin: 0 0 8px;
    font-size: 22px;
    color: #593f89;
  }

  #message p {
    margin: 0 0 12px;
    font-size: 14px;
    line-height: 1.45;
  }

  #startBtn {
    border: none;
    background: linear-gradient(135deg, var(--pink), var(--purple));
    color: #fff;
    border-radius: 999px;
    padding: 10px 22px;
    font-size: 15px;
    font-weight: 800;
  }

  @media (max-width: 420px), (max-height: 760px) {
    #gameWrap {
      padding:
        calc(env(safe-area-inset-top) + 6px)
        8px
        calc(env(safe-area-inset-bottom) + 8px);
      gap: 6px;
    }

    #hud {
      padding: 8px 10px;
      border-radius: 14px;
    }

    .stat {
      font-size: 12px;
    }

    button.ctrl {
      min-width: 54px;
      height: 54px;
      font-size: 20px;
      border-radius: 16px;
    }

    #jumpBtn {
      min-width: 78px;
      font-size: 16px;
    }

    #message {
      width: min(330px, calc(100vw - 24px));
      padding: 16px 16px;
      border-radius: 16px;
    }

    #message h1 {
      font-size: 18px;
    }

    #message p {
      font-size: 13px;
      margin-bottom: 10px;
    }

    #startBtn {
      padding: 10px 18px;
      font-size: 14px;
    }
  }

  @media (min-width: 900px) {
    #gameWrap {
      width: min(430px, 100vw);
      margin: 0 auto;
      left: 50%;
      transform: translateX(-50%);
    }
  }
</style>
</head>
<body>
<div id="gameWrap">
  <div id="hud">
    <div class="stat">높이: <span id="heightTxt">0</span>m</div>
    <div class="stat">코인: <span id="coinTxt">0</span> ✨</div>
    <div class="stat">점프: <span id="jumpTxt">2/2</span></div>
  </div>
  <canvas id="gameCanvas" aria-label="타워 점프 게임"></canvas>
  <div id="controls">
    <div class="pad">
      <button class="ctrl" id="leftBtn" aria-label="왼쪽 이동">◀</button>
      <button class="ctrl" id="rightBtn" aria-label="오른쪽 이동">▶</button>
    </div>
    <button class="ctrl" id="jumpBtn" aria-label="점프">JUMP</button>
  </div>
</div>

<div id="message">
  <h1>🌸 스카이 타워 점프</h1>
  <p>
    귀여운 소녀와 함께 하늘 타워를 올라가세요!<br>
    <b>2단 점프</b>, <b>회오리 장애물</b>, 반짝 코인까지 준비되어 있어요.
  </p>
  <button id="startBtn">게임 시작</button>
</div>

<script>
(() => {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  const ui = {
    height: document.getElementById('heightTxt'),
    coin: document.getElementById('coinTxt'),
    jump: document.getElementById('jumpTxt'),
    message: document.getElementById('message'),
    startBtn: document.getElementById('startBtn')
  };

  const keys = { left: false, right: false };

  let state;

  const GRAVITY = 0.55;
  const MOVE_SPEED = 4.2;
  const JUMP_POWER = -11.5;
  const MAX_JUMPS = 2;
  function setAppHeight() {
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  document.documentElement.style.setProperty('--app-height', `${vh}px`);
}
  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const rect = canvas.getBoundingClientRect();
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    if (state) {
      state.worldWidth = rect.width;
      state.worldHeight = rect.height;
    }
  }

  function createInitialState() {
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    const platformWidth = 110;

    const platforms = [];
    for (let i = 0; i < 24; i++) {
      const y = h - i * 115;
      const x = i === 0 ? w / 2 - 55 : Math.random() * (w - platformWidth);
      platforms.push({ x, y, w: platformWidth, h: 15, sparkle: Math.random() * Math.PI * 2 });
    }

    const coins = platforms.slice(3).map((p, i) => ({
      x: p.x + p.w / 2,
      y: p.y - 24,
      r: 9,
      live: i % 2 === 0
    }));

    const whirlwinds = platforms.slice(4).filter((_, i) => i % 3 === 0).map(p => ({
      x: p.x + p.w / 2,
      y: p.y - 14,
      r: 17,
      phase: Math.random() * Math.PI * 2,
      speed: 0.04 + Math.random() * 0.02
    }));

    return {
      worldWidth: w,
      worldHeight: h,
      cameraY: 0,
      bestHeight: 0,
      scoreCoins: 0,
      running: true,
      girl: {
        x: w / 2,
        y: h - 80,
        w: 30,
        h: 46,
        vx: 0,
        vy: 0,
        jumpsLeft: MAX_JUMPS,
        facing: 1,
        blink: 0
      },
      platforms,
      coins,
      whirlwinds,
      clouds: Array.from({ length: 8 }, (_, i) => ({
        x: Math.random() * w,
        y: i * 180 + Math.random() * 60,
        s: 0.6 + Math.random() * 0.8
      }))
    };
  }

  function restart() {
    state = createInitialState();
    ui.message.style.display = 'none';
    lastTime = performance.now();
    requestAnimationFrame(loop);
  }

function drawBackground() {
  const { worldWidth: w, worldHeight: h, cameraY } = state;

  const grd = ctx.createLinearGradient(0, 0, 0, h);
  grd.addColorStop(0, '#dff4ff');
  grd.addColorStop(0.45, '#d9dcff');
  grd.addColorStop(1, '#aab8ff');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, w, h);

  // 위쪽 반짝이
  for (let i = 0; i < 24; i++) {
    const sx = (i * 53 + 20) % w;
    const sy = ((i * 89) - cameraY * 0.15) % (h + 120);
    const drawY = sy < -20 ? sy + h + 120 : sy;
    const tw = 1.2 + (i % 3) * 0.5;
    ctx.save();
    ctx.translate(sx, drawY);
    ctx.rotate((performance.now() * 0.001) + i);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath();
    ctx.moveTo(0, -tw * 3);
    ctx.lineTo(tw, -tw);
    ctx.lineTo(tw * 3, 0);
    ctx.lineTo(tw, tw);
    ctx.lineTo(0, tw * 3);
    ctx.lineTo(-tw, tw);
    ctx.lineTo(-tw * 3, 0);
    ctx.lineTo(-tw, -tw);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // 구름
  ctx.save();
  state.clouds.forEach(c => {
    const y = (c.y - cameraY * 0.22) % (h + 260);
    const drawY = y < -120 ? y + h + 260 : y;
    const x = c.x + Math.sin((cameraY + c.x) * 0.001) * 16;

    ctx.globalAlpha = 0.6;
    ctx.fillStyle = '#ffffff';
    roundedBlob(x, drawY, 75 * c.s, 26 * c.s);
    ctx.fill();
  });
  ctx.restore();

  // 하트 풍선 느낌
  for (let i = 0; i < 6; i++) {
    const bx = ((i * 97) + 40 + Math.sin(cameraY * 0.002 + i) * 18) % w;
    const byRaw = ((i * 140) - cameraY * 0.28) % (h + 220);
    const by = byRaw < -30 ? byRaw + h + 220 : byRaw;

    ctx.save();
    ctx.translate(bx, by);
    ctx.scale(0.9, 0.9);
    ctx.fillStyle = i % 2 === 0 ? 'rgba(255,182,214,0.45)' : 'rgba(187,210,255,0.45)';
    ctx.beginPath();
    ctx.moveTo(0, 8);
    ctx.bezierCurveTo(-12, -4, -18, -18, 0, -10);
    ctx.bezierCurveTo(18, -18, 12, -4, 0, 8);
    ctx.fill();
    ctx.restore();
  }

  // 멀리 보이는 귀여운 성/집 실루엣
  ctx.save();
  ctx.globalAlpha = 0.22;
  ctx.fillStyle = '#ffffff';
  for (let i = 0; i < 5; i++) {
    const baseX = i * (w / 4) - 20;
    const baseY = h - 70 + Math.sin(i) * 8;
    ctx.beginPath();
    ctx.moveTo(baseX, baseY);
    ctx.lineTo(baseX + 18, baseY - 28);
    ctx.lineTo(baseX + 30, baseY);
    ctx.lineTo(baseX + 48, baseY - 40);
    ctx.lineTo(baseX + 60, baseY);
    ctx.lineTo(baseX + 60, h);
    ctx.lineTo(baseX, h);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}

  function roundedBlob(x, y, w, h) {
    ctx.beginPath();
    ctx.ellipse(x, y, w * 0.4, h * 0.45, 0, 0, Math.PI * 2);
    ctx.ellipse(x - w * 0.2, y + 2, w * 0.24, h * 0.38, 0, 0, Math.PI * 2);
    ctx.ellipse(x + w * 0.24, y + 1, w * 0.2, h * 0.33, 0, 0, Math.PI * 2);
  }

  function drawPlatforms() {
    state.platforms.forEach(p => {
      const sy = p.y - state.cameraY;
      if (sy > -30 && sy < state.worldHeight + 40) {
        const sparkle = Math.sin(performance.now() * 0.003 + p.sparkle) * 0.08 + 0.92;
        ctx.fillStyle = `rgba(255,255,255,${sparkle})`;
        roundRect(p.x, sy, p.w, p.h, 8);
        ctx.fill();
        ctx.fillStyle = '#ffd5ef';
        roundRect(p.x + 8, sy + 3, p.w - 16, p.h - 6, 6);
        ctx.fill();
      }
    });
  }

  function drawCoins() {
    state.coins.forEach(c => {
      if (!c.live) return;
      const sy = c.y - state.cameraY;
      if (sy < -30 || sy > state.worldHeight + 30) return;
      const pulse = 1 + Math.sin(performance.now() * 0.007 + c.x) * 0.1;
      ctx.save();
      ctx.translate(c.x, sy);
      ctx.scale(pulse, pulse);
      ctx.fillStyle = '#ffe97a';
      ctx.beginPath();
      ctx.arc(0, 0, c.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff4b8';
      ctx.beginPath();
      ctx.arc(-2, -2, c.r * 0.45, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
  }

  function drawWhirlwinds() {
    state.whirlwinds.forEach(w => {
      const sy = w.y - state.cameraY;
      if (sy < -40 || sy > state.worldHeight + 40) return;
      w.phase += w.speed;
      for (let i = 0; i < 4; i++) {
        const radius = w.r - i * 3.8;
        ctx.strokeStyle = `rgba(147, 109, 255, ${0.36 + i * 0.14})`;
        ctx.lineWidth = 2.3;
        ctx.beginPath();
        ctx.arc(w.x + Math.sin(w.phase + i) * 7, sy - i * 3, Math.max(3, radius), 0.4, Math.PI * 1.9);
        ctx.stroke();
      }
    });
  }

 function drawGirl() {
  const g = state.girl;
  const x = g.x;
  const y = g.y - state.cameraY;

  ctx.save();
  ctx.translate(x, y);
  ctx.scale(g.facing, 1);

  // 그림자
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#7b6ea8';
  ctx.beginPath();
  ctx.ellipse(0, 24, 13, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // 머리 뒤 실루엣(은회색 머리)
  ctx.fillStyle = '#dfe3f5';
  ctx.beginPath();
  ctx.moveTo(-14, -30);
  ctx.quadraticCurveTo(-18, -10, -14, 0);
  ctx.quadraticCurveTo(-8, 9, 0, 8);
  ctx.quadraticCurveTo(8, 9, 14, 0);
  ctx.quadraticCurveTo(18, -10, 14, -30);
  ctx.quadraticCurveTo(8, -39, 0, -40);
  ctx.quadraticCurveTo(-8, -39, -14, -30);
  ctx.fill();

  // 옆머리
  ctx.beginPath();
  ctx.ellipse(-12, -16, 7, 12, -0.3, 0, Math.PI * 2);
  ctx.ellipse(12, -16, 7, 12, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // 얼굴
  ctx.fillStyle = '#fff2ee';
  ctx.beginPath();
  ctx.ellipse(0, -22, 12, 13, 0, 0, Math.PI * 2);
  ctx.fill();

  // 앞머리
  ctx.fillStyle = '#eef1fb';
  ctx.beginPath();
  ctx.moveTo(-12, -28);
  ctx.quadraticCurveTo(-8, -38, 0, -39);
  ctx.quadraticCurveTo(8, -38, 12, -28);
  ctx.quadraticCurveTo(10, -22, 4, -20);
  ctx.quadraticCurveTo(2, -25, 0, -25);
  ctx.quadraticCurveTo(-2, -25, -4, -20);
  ctx.quadraticCurveTo(-10, -22, -12, -28);
  ctx.fill();

  // 왕관
  ctx.fillStyle = '#f4d45f';
  ctx.beginPath();
  ctx.moveTo(-9, -39);
  ctx.lineTo(-5, -46);
  ctx.lineTo(0, -40);
  ctx.lineTo(5, -47);
  ctx.lineTo(9, -39);
  ctx.closePath();
  ctx.fill();

  ctx.fillStyle = '#e7bf37';
  ctx.beginPath();
  ctx.roundRect(-10, -40, 20, 4, 2);
  ctx.fill();

  // 눈
  ctx.fillStyle = '#9c5b64';
  ctx.beginPath();
  ctx.ellipse(-5, -22, 2.7, 3.8, 0, 0, Math.PI * 2);
  ctx.ellipse(5, -22, 2.7, 3.8, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(-4, -23, 1, 0, Math.PI * 2);
  ctx.arc(6, -23, 1, 0, Math.PI * 2);
  ctx.fill();

  // 입
  ctx.strokeStyle = '#c9808f';
  ctx.lineWidth = 1.1;
  ctx.beginPath();
  ctx.arc(0, -16, 2.5, 0.2, Math.PI - 0.2);
  ctx.stroke();

  // 후드 상의
  ctx.fillStyle = '#7eb6f2';
  ctx.beginPath();
  ctx.moveTo(-12, -5);
  ctx.quadraticCurveTo(-13, 10, -8, 16);
  ctx.lineTo(8, 16);
  ctx.quadraticCurveTo(13, 10, 12, -5);
  ctx.quadraticCurveTo(10, -11, 0, -11);
  ctx.quadraticCurveTo(-10, -11, -12, -5);
  ctx.fill();

  // 후드 목부분
  ctx.fillStyle = '#96c5f7';
  ctx.beginPath();
  ctx.arc(0, -7, 6, 0, Math.PI * 2);
  ctx.fill();

  // 치마
  ctx.fillStyle = '#ffd7cf';
  ctx.beginPath();
  ctx.moveTo(-7, 15);
  ctx.lineTo(7, 15);
  ctx.lineTo(11, 24);
  ctx.lineTo(-11, 24);
  ctx.closePath();
  ctx.fill();

  // 팔
  ctx.strokeStyle = '#7eb6f2';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-10, -2);
  ctx.lineTo(-18, 6);
  ctx.moveTo(10, -2);
  ctx.lineTo(18, 6);
  ctx.stroke();

  // 다리
  ctx.strokeStyle = '#fff0ea';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(-5, 24);
  ctx.lineTo(-9, 35);
  ctx.moveTo(5, 24);
  ctx.lineTo(11, 35);
  ctx.stroke();

  // 신발
  ctx.fillStyle = '#4a4a6f';
  ctx.beginPath();
  ctx.ellipse(-10, 36, 5, 3.5, -0.2, 0, Math.PI * 2);
  ctx.ellipse(12, 36, 5, 3.5, 0.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

function spawnNewSegments() {
  while (Math.min(...state.platforms.map(p => p.y)) - state.cameraY > -2200) {
    const lastTop = Math.min(...state.platforms.map(p => p.y));
    const y = lastTop - (90 + Math.random() * 50);
    const w = 90 + Math.random() * 36;
    const x = Math.random() * (state.worldWidth - w);

    state.platforms.push({ x, y, w, h: 15, sparkle: Math.random() * Math.PI * 2 });

    if (Math.random() < 0.55) {
      state.coins.push({ x: x + w / 2, y: y - 22, r: 9, live: true });
    }

    if (Math.random() < 0.25) {
      state.whirlwinds.push({
        x: x + w / 2,
        y: y - 12,
        r: 16 + Math.random() * 4,
        phase: Math.random() * Math.PI * 2,
        speed: 0.03 + Math.random() * 0.03
      });
    }

    if (state.platforms.length > 80) state.platforms.shift();
    if (state.coins.length > 70) state.coins.shift();
    if (state.whirlwinds.length > 50) state.whirlwinds.shift();
  }
}

  function update(dt) {
    const g = state.girl;

    let move = 0;
    if (keys.left) move -= 1;
    if (keys.right) move += 1;
    g.vx = move * MOVE_SPEED;
    if (move) g.facing = move > 0 ? 1 : -1;

    g.vy += GRAVITY;
    g.x += g.vx;
    g.y += g.vy;

    if (g.x < 16) g.x = 16;
    if (g.x > state.worldWidth - 16) g.x = state.worldWidth - 16;

    state.platforms.forEach(p => {
      if (
        g.vy >= 0 &&
        g.x + 12 > p.x && g.x - 12 < p.x + p.w &&
        g.y + g.h / 2 > p.y && g.y + g.h / 2 < p.y + 14
      ) {
        g.y = p.y - g.h / 2;
        g.vy = 0;
        g.jumpsLeft = MAX_JUMPS;
      }
    });

    state.coins.forEach(c => {
      if (!c.live) return;
      const dx = g.x - c.x;
      const dy = (g.y - 12) - c.y;
      if (dx * dx + dy * dy < (c.r + 12) * (c.r + 12)) {
        c.live = false;
        state.scoreCoins += 1;
      }
    });

    state.whirlwinds.forEach(w => {
      const dx = g.x - w.x;
      const dy = (g.y - 12) - w.y;
      if (dx * dx + dy * dy < (w.r + 9) * (w.r + 9)) {
        g.vy = -8.5;
        g.vx += dx > 0 ? 4 : -4;
      }
    });

    const targetCam = Math.min(state.cameraY, g.y - state.worldHeight * 0.55);
    state.cameraY += (targetCam - state.cameraY) * 0.12;

    const h = Math.max(0, Math.floor((state.worldHeight - (g.y - state.cameraY)) * 0.45 + state.bestHeight));
    state.bestHeight = Math.max(state.bestHeight, h);

    spawnNewSegments();

    if (g.y - state.cameraY > state.worldHeight + 100) {
      gameOver();
    }

    ui.height.textContent = String(state.bestHeight);
    ui.coin.textContent = String(state.scoreCoins);
    ui.jump.textContent = `${g.jumpsLeft}/${MAX_JUMPS}`;
  }

  function gameOver() {
    state.running = false;
    ui.message.innerHTML = `
      <h1>💫 다시 도전!</h1>
      <p>최고 높이 <b>${state.bestHeight}m</b><br>코인 <b>${state.scoreCoins}</b>개를 모았어요.</p>
      <button id="startBtn">다시 시작</button>
    `;
    ui.message.style.display = 'block';
    ui.startBtn = document.getElementById('startBtn');
    ui.startBtn.addEventListener('click', restart, { once: true });
  }

  function draw() {
    drawBackground();
    drawPlatforms();
    drawCoins();
    drawWhirlwinds();
    drawGirl();
  }

  function jump() {
    if (!state || !state.running) return;
    const g = state.girl;
    if (g.jumpsLeft > 0) {
      g.vy = JUMP_POWER;
      g.jumpsLeft -= 1;
      ui.jump.textContent = `${g.jumpsLeft}/${MAX_JUMPS}`;
    }
  }

  let lastTime = 0;
  function loop(t) {
    if (!state || !state.running) return;
    const dt = Math.min(33, t - lastTime);
    lastTime = t;
    update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  function bindButton(id, onDown, onUp) {
    const el = document.getElementById(id);
    const down = e => { e.preventDefault(); el.classList.add('active'); onDown(); };
    const up = e => { e.preventDefault(); el.classList.remove('active'); onUp && onUp(); };
    el.addEventListener('touchstart', down, { passive: false });
    el.addEventListener('touchend', up, { passive: false });
    el.addEventListener('touchcancel', up, { passive: false });
    el.addEventListener('mousedown', down);
    el.addEventListener('mouseup', up);
    el.addEventListener('mouseleave', up);
  }

  bindButton('leftBtn', () => keys.left = true, () => keys.left = false);
  bindButton('rightBtn', () => keys.right = true, () => keys.right = false);
  bindButton('jumpBtn', jump);

  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.left = true;
    if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.right = true;
    if (e.key === ' ' || e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') jump();
  });

  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') keys.right = false;
  });

ui.startBtn.addEventListener('click', restart, { once: true });

window.addEventListener('resize', () => {
  setAppHeight();
  resize();
});

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    setAppHeight();
    resize();
  });
}

setAppHeight();
resize();
})();
</script>
</body>
</html>
